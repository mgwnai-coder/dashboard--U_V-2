<div class="bento-card p-6 flex flex-col h-full w-full bg-white dark:bg-transparent border border-slate-200 dark:border-white/10 shadow-sm dark:shadow-none">
    <div class="flex justify-between items-center mb-6">
        <h3 class="text-slate-800 dark:text-white font-bold flex items-center gap-2 text-lg">
            <i class="{{ icon_class|default:'fa-solid fa-chart-simple' }} text-primary"></i>
            {{ title }}
        </h3>
    </div>
    <div class="relative flex-1 w-full min-h-[300px]">
        <canvas id="{{ chart_id }}"></canvas>
    </div>
</div>
